name: Run DB Migration (one-time)

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Apply migration 006 - Realtime for team_members
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /app/supabase
            docker compose exec -T db psql -U postgres -d postgres -c \
              "ALTER PUBLICATION supabase_realtime ADD TABLE public.team_members;" \
              2>&1 || echo "Already in publication or error"

            echo "--- Current publication tables ---"
            docker compose exec -T db psql -U postgres -d postgres -c \
              "SELECT schemaname, tablename FROM pg_publication_tables WHERE pubname='supabase_realtime' AND tablename IN ('team_members','team_invites','teams');"
