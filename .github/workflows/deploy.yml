name: Deploy to VPS (ezze-app Supabase)

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://ezze.site
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      # Deploy frontend to ezze.site
      - name: Deploy frontend to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: 'dist/*'
          target: '/var/www/ezze-app/'
          strip_components: 1

      # Apply DB migrations
      - name: Copy migrations to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: 'supabase/migrations/*.sql'
          target: '/tmp/ezze-migrations/'
          strip_components: 2

      - name: Apply DB migrations
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /app/supabase
            MIGRATION_ERRORS=0
            for f in $(ls /tmp/ezze-migrations/*.sql | sort); do
              echo "Applying $f..."
              output=$(docker compose exec -T db psql -U postgres -d postgres < "$f" 2>&1)
              exit_code=$?
              echo "$output"
              if [ $exit_code -ne 0 ]; then
                echo "WARNING: Migration $f returned exit code $exit_code (may be already applied)"
                MIGRATION_ERRORS=$((MIGRATION_ERRORS + 1))
              else
                echo "OK: $f"
              fi
            done
            if [ $MIGRATION_ERRORS -gt 0 ]; then
              echo "WARNING: $MIGRATION_ERRORS migration(s) had issues - check logs above"
            fi
            docker compose restart realtime
            echo "Realtime restarted"

      # Deploy Edge Functions
      - name: Deploy Edge Functions to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: 'supabase/functions/*'
          target: '/app/supabase/volumes/functions/'
          strip_components: 2

      - name: Reload Edge Functions runtime
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: cd /app/supabase && docker compose restart functions

      # Deploy Telegram bots
      - name: Deploy bot files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: 'tg_shared.js,tg_master_bot.js,tg_client_bot.js,tg_polling.js'
          target: '/app/ezze-app/'

      - name: Restart both bot services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            systemctl restart ezze-master-bot
            systemctl restart ezze-client-bot

      - name: Notify success
        run: echo "Deployed successfully to https://pro.ezze.site (API: https://ezze.site)"
