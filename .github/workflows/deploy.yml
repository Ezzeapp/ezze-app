name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:

  # ── Frontend: 12 продуктов + регистрационный портал ──────────────────────────
  frontend:
    name: Build & Deploy ${{ matrix.label || matrix.product }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false   # падение одного продукта не останавливает остальные
      max-parallel: 4    # не более 4 одновременных SSH на VPS
      matrix:
        include:
          # Регистрационный портал (app.ezze.site) — должен деплоиться первым в списке
          - product: beauty
            label: app.ezze.site (register)
            app_url: https://app.ezze.site
            web_path: /var/www/ezze-app/
          - product: beauty
            app_url: https://beauty.ezze.site
            web_path: /var/www/ezze-beauty/
          - product: clinic
            app_url: https://clinic.ezze.site
            web_path: /var/www/ezze-clinic/
          - product: workshop
            app_url: https://workshop.ezze.site
            web_path: /var/www/ezze-workshop/
          - product: edu
            app_url: https://edu.ezze.site
            web_path: /var/www/ezze-edu/
          - product: hotel
            app_url: https://hotel.ezze.site
            web_path: /var/www/ezze-hotel/
          - product: food
            app_url: https://food.ezze.site
            web_path: /var/www/ezze-food/
          - product: event
            app_url: https://event.ezze.site
            web_path: /var/www/ezze-event/
          - product: farm
            app_url: https://farm.ezze.site
            web_path: /var/www/ezze-farm/
          - product: transport
            app_url: https://transport.ezze.site
            web_path: /var/www/ezze-transport/
          - product: build
            app_url: https://build.ezze.site
            web_path: /var/www/ezze-build/
          - product: trade
            app_url: https://trade.ezze.site
            web_path: /var/www/ezze-trade/
          - product: cleaning
            app_url: https://cleaning.ezze.site
            web_path: /var/www/ezze-cleaning/

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend (${{ matrix.product }})
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://ezze.site
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_APP_URL: ${{ matrix.app_url }}
          VITE_PRODUCT: ${{ matrix.product }}
          VITE_MASTER_BOT: ezzemaster_bot
          VITE_CLIENT_BOT: ezzeclient_bot

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          printf 'Host *\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null\n  ConnectTimeout 30\n  ServerAliveInterval 15\n  ServerAliveCountMax 4\n' > ~/.ssh/config

      - name: Deploy frontend to VPS
        continue-on-error: true   # SSH-таймауты GitHub раннеров не ломают весь workflow
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 15
          command: rsync -az --delete dist/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ matrix.web_path }}

  # ── Infrastructure: миграции + edge functions (один раз, не на каждый продукт) ──
  infrastructure:
    name: Migrations & Edge Functions
    runs-on: ubuntu-latest
    continue-on-error: true   # SSH-таймауты от GitHub раннеров не ломают workflow

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          printf 'Host *\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null\n  ConnectTimeout 30\n  ServerAliveInterval 15\n  ServerAliveCountMax 4\n' > ~/.ssh/config

      - name: Copy migrations to VPS
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 3
          max_attempts: 3
          retry_wait_seconds: 15
          command: rsync -az supabase/migrations/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/ezze-migrations/

      - name: Apply DB migrations
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} '
            cd /app/supabase
            MIGRATION_ERRORS=0
            for f in $(ls /tmp/ezze-migrations/*.sql 2>/dev/null | sort); do
              echo "Applying $f..."
              output=$(docker compose exec -T db psql -U postgres -d postgres < "$f" 2>&1)
              exit_code=$?
              echo "$output"
              if [ $exit_code -ne 0 ]; then
                echo "WARNING: Migration $f returned exit code $exit_code"
                MIGRATION_ERRORS=$((MIGRATION_ERRORS + 1))
              else
                echo "OK: $f"
              fi
            done
            if [ $MIGRATION_ERRORS -gt 0 ]; then
              echo "WARNING: $MIGRATION_ERRORS migration(s) had issues (likely already applied)"
            fi
            docker compose restart realtime
            echo "Realtime restarted"
          '

      - name: Deploy Edge Functions to VPS
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 3
          max_attempts: 3
          retry_wait_seconds: 15
          command: rsync -az supabase/functions/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/app/supabase/volumes/functions/

      - name: Restart Edge Functions runtime
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} 'cd /app/supabase && docker compose restart functions'

  # ── Bots: деплой и рестарт один раз (не на каждый продукт) ─────────────────
  bots:
    name: Deploy Bots
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          printf 'Host *\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null\n  ConnectTimeout 30\n  ServerAliveInterval 15\n  ServerAliveCountMax 4\n' > ~/.ssh/config

      - name: Deploy Telegram bots to VPS
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 3
          max_attempts: 3
          retry_wait_seconds: 15
          command: rsync -az tg_shared.js tg_master_bot.js tg_client_bot.js tg_polling.js package.json ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_BOT_PATH }}

      - name: Restart bot services
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} '
            systemctl restart ${{ secrets.BOT_SERVICE_MASTER }}
            systemctl restart ${{ secrets.BOT_SERVICE_CLIENT }}
          '

      - name: Notify success
        run: echo "✅ All 12 products + registration portal deployed successfully"
