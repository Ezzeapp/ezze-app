name: Deploy to VPS (ezze-app Supabase)

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://ezze.site
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy frontend to VPS
        run: |
          rsync -az --delete dist/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/var/www/ezze-app/

      - name: Copy migrations to VPS
        run: |
          rsync -az supabase/migrations/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/ezze-migrations/

      - name: Apply DB migrations
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} '
            cd /app/supabase
            MIGRATION_ERRORS=0
            for f in $(ls /tmp/ezze-migrations/*.sql 2>/dev/null | sort); do
              echo "Applying $f..."
              output=$(docker compose exec -T db psql -U postgres -d postgres < "$f" 2>&1)
              exit_code=$?
              echo "$output"
              if [ $exit_code -ne 0 ]; then
                echo "WARNING: Migration $f returned exit code $exit_code"
                MIGRATION_ERRORS=$((MIGRATION_ERRORS + 1))
              else
                echo "OK: $f"
              fi
            done
            if [ $MIGRATION_ERRORS -gt 0 ]; then
              echo "WARNING: $MIGRATION_ERRORS migration(s) had issues"
            fi
            docker compose restart realtime
            echo "Realtime restarted"
          '

      - name: Deploy Edge Functions to VPS
        run: |
          rsync -az supabase/functions/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/app/supabase/volumes/functions/

      - name: Reload Edge Functions runtime
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} 'cd /app/supabase && docker compose restart functions'

      - name: Deploy Telegram bots to VPS
        run: |
          rsync -az tg_shared.js tg_master_bot.js tg_client_bot.js tg_polling.js ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/app/ezze-app/

      - name: Restart bot services
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} '
            systemctl restart ezze-master-bot
            systemctl restart ezze-client-bot
          '

      - name: Notify success
        run: echo "Deployed successfully to https://pro.ezze.site"
